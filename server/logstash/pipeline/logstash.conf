input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # 解析 JSON 格式的日志
  if [message] =~ /^{.*}$/ {
    json {
      source => "message"
    }
  }

  # 添加时间戳
  date {
    match => ["timestamp", "ISO8601"]
    timezone => "Asia/Shanghai"
  }

  # 添加环境标签
  mutate {
    add_field => {
      "environment" => "${ELK_ENV:development}"
      "application" => "cleaning-service"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "nestjs-logs-%{+YYYY.MM.dd}"
    codec => json
  }

  # 同时输出到控制台（用于调试）
  stdout {
    codec => rubydebug
  }
}
