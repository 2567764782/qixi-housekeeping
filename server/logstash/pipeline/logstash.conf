input {
  # TCP input for structured JSON logs
  tcp {
    port => 5000
    codec => json_lines
    type => "app"
  }

  # File input for log files
  file {
    path => "/var/log/cleaning-service/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "file"
  }
}

filter {
  # 根据日志类型处理
  if [type] == "app" {
    # JSON 解析
    if [message] =~ /^{.*}$/ {
      json {
        source => "message"
        target => "log_data"
      }

      # 重命名字段
      mutate {
        rename => { "log_data.level" => "[level]" }
        rename => { "log_data.message" => "[message]" }
        rename => { "log_data.timestamp" => "[timestamp]" }
        rename => { "log_data.context" => "[context]" }
        rename => { "log_data.traceId" => "[trace_id]" }
        rename => { "log_data.spanId" => "[span_id]" }
      }
    }

    # 添加时间戳
    date {
      match => ["timestamp", "ISO8601"]
      timezone => "Asia/Shanghai"
      target => "@timestamp"
    }
  } else if [type] == "file" {
    # 文件日志解析
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{LOGLEVEL:level}\] %{GREEDYDATA:message}" }
    }

    date {
      match => ["timestamp", "ISO8601"]
      timezone => "Asia/Shanghai"
    }
  }

  # 添加环境标签
  mutate {
    add_field => {
      "environment" => "${ELK_ENV:-development}"
      "application" => "cleaning-service"
      "version" => "1.0.0"
    }
  }

  # 错误日志标记
  if [level] == "error" or [level] == "ERROR" {
    mutate {
      add_field => { "is_error" => true }
    }
  } else {
    mutate {
      add_field => { "is_error" => false }
    }
  }

  # 提取用户ID（如果存在）
  grok {
    match => { "message" => "userId=%{WORD:user_id}" }
  }

  # 提取订单ID（如果存在）
  grok {
    match => { "message" => "orderId=%{WORD:order_id}" }
  }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "nestjs-logs-%{+YYYY.MM.dd}"
    codec => json
    # 启用数据生命周期管理（ILM）
    ilm_enabled => true
    ilm_rollover_alias => "nestjs-logs"
    ilm_pattern => "{now/d}-000001"
    ilm_policy => "nestjs-logs-policy"
  }

  # 同时输出到控制台（用于调试）
  stdout {
    codec => rubydebug
  }
}
