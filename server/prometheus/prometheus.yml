global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'cleaning-service-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Prometheus 自身指标
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter 指标
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  # NestJS 应用指标
  - job_name: 'nestjs_app'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Elasticsearch 指标（如果启用了 ELK）
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']
    metrics_path: '/_prometheus/metrics'
    scrape_interval: 30s
