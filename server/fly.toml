# Fly.io 配置文件
# 文档：https://fly.io/docs/reference/configuration/

app = "qixi-housekeeping-api"
primary_region = "hkg"  # 香港，距离中国最近

[build]
  builder = "heroku/buildpacks:20"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false  # 不自动停止，保持服务运行
  auto_start_machines = true
  min_machines_running = 1  # 至少运行 1 个实例

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/hello"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
